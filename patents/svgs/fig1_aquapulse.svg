<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="black" stroke-width="0.8"/>
    </marker>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
    .label { font-size: 12px; font-weight: bold; }
    .caption { font-size: 10px; }
    .thin { stroke-width: 0.5; }
    .med { stroke-width: 1.2; }
    .thick { stroke-width: 2.0; }
    .leader { stroke-width: 0.4; }
  </style>

  <text x="400" y="30" text-anchor="middle" font-size="14" font-weight="bold">FIG. 1</text>

  <!-- MASK ASSEMBLY — low-profile, wide panoramic single lens (matching AquaPulse render) -->
  <!-- Mask frame: wider than tall, slightly rectangular with rounded corners -->
  <path d="M240,150 Q250,100 320,80 L480,80 Q550,100 560,150 Q570,195 560,240 Q545,280 510,300 Q470,318 400,322 Q330,318 290,300 Q255,280 240,240 Q230,195 240,150 Z" fill="none" stroke="black" class="thick"/>

  <!-- Single panoramic lens — wide, low-profile, no divider -->
  <path d="M260,155 Q268,112 330,95 L470,95 Q532,112 540,155 Q548,192 540,230 Q528,265 500,282 Q465,298 400,302 Q335,298 300,282 Q272,265 260,230 Q252,192 260,155 Z" fill="none" stroke="black" class="med"/>

  <!-- Nose pocket — integrated bump in lower frame -->
  <path d="M385,295 Q390,312 400,320 Q410,312 415,295" fill="none" stroke="black" class="med"/>

  <!-- Silicone face seal (dashed — soft material, offset from frame) -->
  <path d="M232,148 Q242,92 318,72 L482,72 Q558,92 568,148 Q578,198 568,245 Q552,288 516,310 Q474,328 400,332 Q326,328 284,310 Q248,288 232,245 Q222,198 232,148 Z" fill="none" stroke="black" stroke-dasharray="6,3" class="thin"/>

  <!-- Strap attachment posts (small hardware loops on frame edge) -->
  <rect x="228" y="180" width="10" height="14" rx="2" fill="none" stroke="black" class="med"/>
  <rect x="562" y="180" width="10" height="14" rx="2" fill="none" stroke="black" class="med"/>

  <!-- HEAD STRAP (offset to upper right — exploded view) -->
  <path d="M600,120 Q640,100 660,130 Q680,200 660,260 Q640,300 600,270" fill="none" stroke="black" class="med"/>
  <!-- Quick-release buckle -->
  <rect x="648" y="170" width="28" height="18" rx="3" fill="none" stroke="black" class="med"/>
  <line x1="662" y1="170" x2="662" y2="188" stroke="black" class="thin"/>
  <!-- Buckle squeeze tabs -->
  <line x1="648" y1="179" x2="643" y2="179" stroke="black" class="thin"/>
  <line x1="676" y1="179" x2="681" y2="179" stroke="black" class="thin"/>

  <!-- MOUTHPIECE (offset below left — exploded) -->
  <path d="M280,380 Q288,368 310,365 Q332,363 342,370 L344,386 Q340,396 320,399 Q298,399 285,393 Z" fill="none" stroke="black" class="med"/>
  <!-- Bite flanges -->
  <path d="M290,375 Q310,370 335,373" fill="none" stroke="black" class="thin"/>
  <path d="M290,388 Q310,393 335,390" fill="none" stroke="black" class="thin"/>
  <!-- Connection dashed line to tube -->
  <line x1="344" y1="382" x2="378" y2="420" stroke="black" stroke-dasharray="4,2" class="thin"/>

  <!-- BREATHING TUBE — corrugated texture (alternating wide/narrow) -->
  <path d="M378,420 Q384,450 388,480 Q392,510 396,540 Q398,560 400,580" fill="none" stroke="black" class="med"/>
  <path d="M402,420 Q400,450 398,480 Q396,510 396,540 Q396,560 396,580" fill="none" stroke="black" class="thin"/>
  <!-- Corrugation rings -->
  <ellipse cx="390" cy="435" rx="13" ry="3" fill="none" stroke="black" class="thin"/>
  <ellipse cx="391" cy="455" rx="12" ry="3" fill="none" stroke="black" class="thin"/>
  <ellipse cx="393" cy="475" rx="11" ry="3" fill="none" stroke="black" class="thin"/>
  <ellipse cx="394" cy="495" rx="11" ry="3" fill="none" stroke="black" class="thin"/>
  <ellipse cx="395" cy="515" rx="10" ry="3" fill="none" stroke="black" class="thin"/>
  <ellipse cx="397" cy="535" rx="10" ry="3" fill="none" stroke="black" class="thin"/>
  <ellipse cx="398" cy="555" rx="10" ry="3" fill="none" stroke="black" class="thin"/>
  <!-- Tube top opening -->
  <ellipse cx="390" cy="420" rx="12" ry="4" fill="none" stroke="black" class="thin"/>

  <!-- FIRST-STAGE REGULATOR (compact, on top of tank) -->
  <rect x="370" y="618" width="56" height="30" rx="6" fill="none" stroke="black" class="thick"/>
  <!-- Purge button on regulator face -->
  <circle cx="398" cy="633" r="8" fill="none" stroke="black" class="med"/>
  <!-- LP hose output port (top) -->
  <rect x="390" y="606" width="16" height="14" rx="2" fill="none" stroke="black" class="med"/>
  <!-- Hose barb threads -->
  <line x1="393" y1="608" x2="403" y2="608" stroke="black" class="thin"/>
  <line x1="393" y1="612" x2="403" y2="612" stroke="black" class="thin"/>

  <!-- Pressure gauge (on side of regulator) -->
  <circle cx="432" cy="633" r="12" fill="none" stroke="black" class="med"/>
  <line x1="432" y1="625" x2="432" y2="633" stroke="black" class="thin"/>
  <line x1="432" y1="633" x2="437" y2="629" stroke="black" class="thin"/>

  <!-- Connection from regulator to tube (dashed) -->
  <line x1="398" y1="606" x2="398" y2="580" stroke="black" stroke-dasharray="6,3" class="thin"/>

  <!-- TANK VALVE (between regulator and tank) -->
  <rect x="383" y="650" width="30" height="24" rx="3" fill="none" stroke="black" class="med"/>
  <!-- M18x1.5 thread detail -->
  <line x1="386" y1="670" x2="410" y2="670" stroke="black" class="thin"/>
  <line x1="386" y1="673" x2="410" y2="673" stroke="black" class="thin"/>

  <!-- 0.5L TANK (bottom) -->
  <rect x="362" y="678" width="72" height="175" rx="36" fill="none" stroke="black" class="thick"/>

  <!-- REFERENCE NUMERAL LABELS (numbers only with leader lines) -->
  <line x1="240" y1="130" x2="195" y2="110" stroke="black" class="leader"/>
  <circle cx="240" cy="130" r="1.5" fill="black"/>
  <text x="175" y="114" class="label">10</text>

  <line x1="265" y1="190" x2="210" y2="190" stroke="black" class="leader"/>
  <circle cx="265" cy="190" r="1.5" fill="black"/>
  <text x="190" y="194" class="label">12</text>

  <line x1="235" y1="230" x2="185" y2="245" stroke="black" class="leader"/>
  <circle cx="235" cy="230" r="1.5" fill="black"/>
  <text x="145" y="249" class="label">14</text>

  <line x1="415" y1="320" x2="460" y2="335" stroke="black" class="leader"/>
  <circle cx="415" cy="320" r="1.5" fill="black"/>
  <text x="465" y="339" class="label">16</text>

  <line x1="572" y1="187" x2="600" y2="175" stroke="black" class="leader"/>
  <circle cx="572" cy="187" r="1.5" fill="black"/>
  <text x="605" y="179" class="label">18</text>

  <line x1="660" y1="195" x2="700" y2="195" stroke="black" class="leader"/>
  <circle cx="660" cy="195" r="1.5" fill="black"/>
  <text x="705" y="199" class="label">20</text>

  <line x1="676" y1="179" x2="710" y2="165" stroke="black" class="leader"/>
  <circle cx="676" cy="179" r="1.5" fill="black"/>
  <text x="715" y="169" class="label">22</text>

  <line x1="280" y1="382" x2="240" y2="375" stroke="black" class="leader"/>
  <circle cx="280" cy="382" r="1.5" fill="black"/>
  <text x="200" y="379" class="label">24</text>

  <line x1="402" y1="495" x2="450" y2="495" stroke="black" class="leader"/>
  <circle cx="402" cy="495" r="1.5" fill="black"/>
  <text x="455" y="499" class="label">26</text>

  <line x1="426" y1="633" x2="480" y2="620" stroke="black" class="leader"/>
  <text x="485" y="624" class="label">28</text>

  <line x1="444" y1="633" x2="490" y2="640" stroke="black" class="leader"/>
  <text x="495" y="644" class="label">30</text>

  <line x1="370" y1="633" x2="320" y2="633" stroke="black" class="leader"/>
  <circle cx="370" cy="633" r="1.5" fill="black"/>
  <text x="280" y="637" class="label">32</text>

  <line x1="413" y1="662" x2="460" y2="658" stroke="black" class="leader"/>
  <circle cx="413" cy="662" r="1.5" fill="black"/>
  <text x="465" y="662" class="label">34</text>

  <line x1="434" y1="770" x2="470" y2="770" stroke="black" class="leader"/>
  <circle cx="434" cy="770" r="1.5" fill="black"/>
  <text x="475" y="774" class="label">36</text>

  <!-- Legend -->
  <text x="50" y="910" class="caption" font-weight="bold">Reference Numerals:</text>
  <text x="50" y="925" class="caption">10 — Mask assembly  |  12 — Panoramic lens  |  14 — Silicone face seal  |  16 — Nose pocket</text>
  <text x="50" y="940" class="caption">18 — Strap attachment points  |  20 — Head strap  |  22 — Quick-release buckle  |  24 — Mouthpiece</text>
  <text x="50" y="955" class="caption">26 — Breathing tube (corrugated)  |  28 — Regulator body  |  30 — Pressure gauge  |  32 — First-stage regulator</text>
  <text x="50" y="970" class="caption">34 — Tank valve connection (M18x1.5)  |  36 — 0.5L compressed air tank</text>
</svg>