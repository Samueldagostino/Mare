<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <marker id="a6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="black" stroke-width="0.8"/>
    </marker>
  </defs>
  <style>text{font-family:Arial,sans-serif}.label{font-size:12px;font-weight:bold}.caption{font-size:10px}.t{stroke-width:0.5}.m{stroke-width:1.2}.k{stroke-width:2.0}.h{stroke-width:0.4;stroke:gray}.leader{stroke-width:0.4}</style>
  <text x="400" y="25" text-anchor="middle" font-size="14" font-weight="bold">FIG. 6</text>

  <!-- Helmet shell wall (partial, side view) -->
  <path d="M250,100 L250,450" fill="none" stroke="black" class="k"/>
  <path d="M270,100 L270,450" fill="none" stroke="black" class="k"/>
  <!-- Shell wall hatching -->
  <line x1="253" y1="110" x2="263" y2="125" class="h"/>
  <line x1="253" y1="150" x2="263" y2="165" class="h"/>
  <line x1="253" y1="190" x2="263" y2="205" class="h"/>
  <line x1="253" y1="230" x2="263" y2="245" class="h"/>
  <line x1="253" y1="350" x2="263" y2="365" class="h"/>
  <line x1="253" y1="390" x2="263" y2="405" class="h"/>

  <!-- BULKHEAD FITTING through shell wall -->
  <rect x="240" y="260" width="40" height="30" rx="3" fill="none" stroke="black" class="k"/>
  <!-- O-ring seals -->
  <ellipse cx="250" cy="275" rx="3" ry="8" fill="none" stroke="black" class="m"/>
  <ellipse cx="270" cy="275" rx="3" ry="8" fill="none" stroke="black" class="m"/>
  <!-- Air passage through bulkhead -->
  <rect x="255" y="268" width="10" height="14" fill="white" stroke="black" class="m"/>

  <!-- Interior demand valve -->
  <rect x="200" y="265" width="42" height="20" rx="4" fill="none" stroke="black" class="m"/>

  <!-- Exterior first-stage regulator -->
  <rect x="278" y="262" width="50" height="26" rx="4" fill="none" stroke="black" class="m"/>

  <!-- TANK CRADLE -->
  <path d="M330,160 Q340,150 355,155 L355,400 Q340,410 330,400 Z" fill="none" stroke="black" class="k"/>
  <!-- Snap-lock latch -->
  <rect x="335" y="155" width="25" height="12" rx="2" fill="none" stroke="black" class="m"/>
  <!-- Spring in latch -->
  <path d="M340,160 Q343,157 346,160 Q349,163 352,160" fill="none" stroke="black" class="t"/>

  <!-- TANK (0.5L, angled) -->
  <g transform="rotate(-15, 430, 280)">
    <rect x="360" y="150" width="50" height="160" rx="25" fill="none" stroke="black" class="k"/>
    <rect x="375" y="138" width="20" height="15" rx="3" fill="none" stroke="black" class="m"/>
  </g>

  <!-- Air flow arrows -->
  <line x1="328" y1="275" x2="285" y2="275" stroke="black" class="m" marker-end="url(#a6)"/>
  <line x1="240" y1="275" x2="215" y2="275" stroke="black" class="m" marker-end="url(#a6)"/>

  <!-- REFERENCE LABELS (numbers only) -->
  <line x1="200" y1="275" x2="160" y2="270" stroke="black" class="leader"/>
  <text x="125" y="274" class="label">222</text>

  <line x1="240" y1="280" x2="195" y2="295" stroke="black" class="leader"/>
  <text x="150" y="299" class="label">208</text>

  <line x1="405" y1="210" x2="460" y2="180" stroke="black" class="leader"/>
  <text x="465" y="184" class="label">206</text>

  <line x1="355" y1="300" x2="410" y2="330" stroke="black" class="leader"/>
  <text x="415" y="334" class="label">216</text>

  <line x1="380" y1="145" x2="430" y2="130" stroke="black" class="leader"/>
  <text x="435" y="134" class="label">242</text>

  <line x1="303" y1="275" x2="340" y2="250" stroke="black" class="leader"/>
  <text x="345" y="248" class="label">244</text>

  <line x1="250" y1="267" x2="210" y2="250" stroke="black" class="leader"/>
  <text x="160" y="254" class="label">246</text>

  <text x="50" y="490" class="caption" font-weight="bold">Reference Numerals:</text>
  <text x="50" y="505" class="caption">206 — Tank  |  208 — Bulkhead fitting  |  216 — Tank cradle  |  222 — Demand valve</text>
  <text x="50" y="520" class="caption">242 — Tank valve  |  244 — First-stage regulator  |  246 — O-ring seals</text>
</svg>