  <text x="50" y="680" class="caption" font-weight="bold">Air Path: Tank (206) → Tube → Bulkhead (208) → Internal tube → Mouthpiece (252) → Breathing space → Chin chamber (238) → Diffuser (212) → Bubbles (226)</text>
</svg>