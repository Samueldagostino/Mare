<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    text { font-family: Arial, sans-serif; }
    .label { font-size: 12px; font-weight: bold; }
    .caption { font-size: 10px; }
    .thin { stroke-width: 0.5; }
    .med { stroke-width: 1.2; }
    .thick { stroke-width: 2.0; }
    .leader { stroke-width: 0.4; }
  </style>
  <text x="400" y="30" text-anchor="middle" font-size="14" font-weight="bold">FIG. 5</text>

  <!-- STEP A: Tank approaching cradle -->
  <text x="133" y="65" text-anchor="middle" font-size="12" font-weight="bold">(a)</text>
  <!-- Cradle -->
  <rect x="80" y="130" width="106" height="50" rx="8" fill="none" stroke="black" class="thick"/>
  <!-- Latch bracket (open position) -->
  <rect x="113" y="123" width="40" height="12" rx="2" fill="none" stroke="black" class="med"/>
  <!-- Spring-loaded latch arm (open — pointing up) -->
  <path d="M133,123 L133,105" fill="none" stroke="black" class="med"/>
  <path d="M125,108 L133,100 L141,108" fill="none" stroke="black" class="thin"/>
  <!-- Anti-rotation channel (keyway slot in cradle base) -->
  <line x1="118" y1="175" x2="118" y2="180" stroke="black" class="med"/>
  <line x1="148" y1="175" x2="148" y2="180" stroke="black" class="med"/>
  <!-- Tank above (approaching) -->
  <rect x="108" y="210" width="50" height="120" rx="25" fill="none" stroke="black" class="thick"/>
  <rect x="120" y="198" width="26" height="14" rx="2" fill="none" stroke="black" class="med"/>
  <!-- Neck ring on tank -->
  <ellipse cx="133" cy="218" rx="28" ry="4" fill="none" stroke="black" class="thin"/>
  <!-- Arrow showing direction -->
  <line x1="133" y1="198" x2="133" y2="185" stroke="black" class="med"/>
  <path d="M128,190 L133,180 L138,190" fill="none" stroke="black" class="med"/>

  <!-- STEP B: Tank engaging -->
  <text x="400" y="65" text-anchor="middle" font-size="12" font-weight="bold">(b)</text>
  <rect x="347" y="130" width="106" height="50" rx="8" fill="none" stroke="black" class="thick"/>
  <!-- Latch partially closing (angled) -->
  <path d="M400,125 L400,115 Q395,110 390,115" fill="none" stroke="black" class="med"/>
  <!-- Tank partially inserted -->
  <rect x="375" y="160" width="50" height="120" rx="25" fill="none" stroke="black" class="thick"/>
  <rect x="387" y="148" width="26" height="14" rx="2" fill="none" stroke="black" class="med"/>
  <!-- Neck ring contacting latch -->
  <ellipse cx="400" cy="168" rx="28" ry="4" fill="none" stroke="black" class="thin"/>

  <!-- STEP C: Tank locked -->
  <text x="667" y="65" text-anchor="middle" font-size="12" font-weight="bold">(c)</text>
  <rect x="614" y="130" width="106" height="50" rx="8" fill="none" stroke="black" class="thick"/>
  <!-- Latch closed and locked -->
  <rect x="647" y="123" width="40" height="12" rx="2" fill="none" stroke="black" class="thick"/>
  <!-- Tank fully seated -->
  <rect x="642" y="175" width="50" height="120" rx="25" fill="none" stroke="black" class="thick"/>
  <rect x="654" y="163" width="26" height="14" rx="2" fill="none" stroke="black" class="med"/>
  <!-- Latch engagement lines (showing locked state) -->
  <line x1="640" y1="155" x2="640" y2="175" stroke="black" class="med"/>
  <line x1="692" y1="155" x2="692" y2="175" stroke="black" class="med"/>
  <!-- Anti-rotation ridges engaged -->
  <line x1="652" y1="175" x2="652" y2="180" stroke="black" class="med"/>
  <line x1="682" y1="175" x2="682" y2="180" stroke="black" class="med"/>

  <!-- Reference labels -->
  <line x1="86" y1="155" x2="55" y2="155" stroke="black" class="leader"/>
  <text x="30" y="159" class="label">108</text>

  <line x1="108" y1="280" x2="65" y2="290" stroke="black" class="leader"/>
  <text x="40" y="294" class="label">110</text>

  <line x1="141" y1="105" x2="175" y2="95" stroke="black" class="leader"/>
  <text x="180" y="99" class="label">128</text>

  <line x1="133" y1="218" x2="175" y2="225" stroke="black" class="leader"/>
  <text x="180" y="229" class="label">126</text>

  <line x1="148" y1="178" x2="185" y2="178" stroke="black" class="leader"/>
  <text x="190" y="182" class="label">129</text>

  <!-- Legend -->
  <text x="50" y="380" class="caption" font-weight="bold">Reference Numerals:</text>
  <text x="50" y="395" class="caption">108 — Tank cradle  |  110 — 0.5L tank  |  126 — Tank neck ring  |  128 — Spring-loaded latch  |  129 — Anti-rotation channel</text>
  <text x="50" y="415" class="caption">Sequence: (a) Tank approaches with latch open  (b) Neck ring engages latch  (c) Fully locked, anti-rotation engaged</text>
</svg>