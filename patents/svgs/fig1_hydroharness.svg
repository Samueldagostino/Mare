<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <style>
    text { font-family: Arial, sans-serif; }
    .label { font-size: 12px; font-weight: bold; }
    .caption { font-size: 10px; }
    .thin { stroke-width: 0.5; }
    .med { stroke-width: 1.2; }
    .thick { stroke-width: 2.0; }
    .leader { stroke-width: 0.4; }
    .body { stroke-width: 0.8; stroke-dasharray: 8,4; }
  </style>
  <text x="400" y="30" text-anchor="middle" font-size="14" font-weight="bold">FIG. 1</text>

  <!-- User torso (dashed — not part of invention) -->
  <!-- Head with basic features -->
  <path d="M400,62 Q370,62 358,75 Q348,90 352,108 Q358,120 370,128 Q380,133 388,135" fill="none" stroke="black" class="body"/>
  <path d="M400,62 Q430,62 442,75 Q452,90 448,108 Q442,120 430,128 Q420,133 412,135" fill="none" stroke="black" class="body"/>
  <!-- Nose -->
  <path d="M398,88 Q402,95 400,102" fill="none" stroke="black" class="body"/>
  <!-- Neck -->
  <path d="M388,135 Q385,148 382,160" fill="none" stroke="black" class="body"/>
  <path d="M412,135 Q415,148 418,160" fill="none" stroke="black" class="body"/>
  <!-- Torso outline -->
  <path d="M382,160 Q340,170 300,190 Q270,210 260,250 Q255,320 260,390 Q265,440 275,500 Q285,530 310,550 Q360,575 400,580 Q440,575 490,550 Q515,530 525,500 Q535,440 540,390 Q545,320 540,250 Q530,210 500,190 Q460,170 418,160" fill="none" stroke="black" class="body"/>

  <!-- WAIST BELT -->
  <path d="M220,385 L280,378 L330,375 L400,373 L470,375 L520,378 L580,385" fill="none" stroke="black" class="thick"/>
  <path d="M220,413 L280,406 L330,403 L400,401 L470,403 L520,406 L580,413" fill="none" stroke="black" class="thick"/>
  <!-- Belt wraps behind -->
  <path d="M220,385 Q200,390 195,399 Q200,408 220,413" fill="none" stroke="black" class="thick"/>
  <path d="M580,385 Q600,390 605,399 Q600,408 580,413" fill="none" stroke="black" class="thick"/>
  <!-- Belt webbing texture -->
  <line x1="250" y1="390" x2="250" y2="408" stroke="black" class="thin"/>
  <line x1="290" y1="383" x2="290" y2="401" stroke="black" class="thin"/>
  <line x1="510" y1="383" x2="510" y2="401" stroke="black" class="thin"/>
  <line x1="550" y1="390" x2="550" y2="408" stroke="black" class="thin"/>

  <!-- Neoprene padding (cross-hatch) -->
  <line x1="340" y1="377" x2="345" y2="399" stroke="gray" class="thin"/>
  <line x1="360" y1="376" x2="365" y2="398" stroke="gray" class="thin"/>
  <line x1="440" y1="376" x2="445" y2="398" stroke="gray" class="thin"/>
  <line x1="460" y1="377" x2="465" y2="399" stroke="gray" class="thin"/>

  <!-- QUICK-RELEASE BUCKLE (center) -->
  <rect x="382" y="374" width="36" height="28" rx="4" fill="none" stroke="black" class="thick"/>
  <path d="M385,380 L385,396" stroke="black" class="med"/>
  <path d="M415,380 L415,396" stroke="black" class="med"/>
  <line x1="400" y1="374" x2="400" y2="402" stroke="black" class="thin" stroke-dasharray="3,2"/>

  <!-- D-RING attachment points -->
  <path d="M330,380 Q320,375 315,383 Q310,391 320,395 L330,398" fill="none" stroke="black" class="med"/>
  <path d="M470,380 Q480,375 485,383 Q490,391 480,395 L470,398" fill="none" stroke="black" class="med"/>

  <!-- TANK CRADLE — fabric webbing loops -->
  <!-- Loop 1 (outer) -->
  <path d="M275,403 L275,425 L275,545 Q275,563 290,563 L305,563 Q320,563 320,545 L320,425 L320,403" fill="none" stroke="black" class="thick"/>
  <!-- Loop 2 (inner) -->
  <path d="M330,403 L330,425 L330,545 Q330,563 345,563 L360,563 Q375,563 375,545 L375,425 L375,403" fill="none" stroke="black" class="thick"/>
  <!-- Stitching reinforcement -->
  <line x1="275" y1="405" x2="320" y2="405" stroke="black" class="thin"/>
  <line x1="275" y1="408" x2="320" y2="408" stroke="black" class="thin"/>
  <line x1="330" y1="405" x2="375" y2="405" stroke="black" class="thin"/>
  <line x1="330" y1="408" x2="375" y2="408" stroke="black" class="thin"/>

  <!-- TANK 1 -->
  <rect x="280" y="415" width="36" height="140" rx="18" fill="none" stroke="black" class="thick"/>
  <rect x="287" y="398" width="22" height="18" rx="3" fill="none" stroke="black" class="med"/>
  <circle cx="298" cy="402" r="5" fill="none" stroke="black" class="thin"/>

  <!-- TANK 2 -->
  <rect x="335" y="415" width="36" height="140" rx="18" fill="none" stroke="black" class="thick"/>
  <rect x="342" y="398" width="22" height="18" rx="3" fill="none" stroke="black" class="med"/>
  <circle cx="353" cy="402" r="5" fill="none" stroke="black" class="thin"/>

  <!-- Y-VALVE MANIFOLD -->
  <line x1="298" y1="398" x2="314" y2="381" stroke="black" class="thick"/>
  <line x1="353" y1="398" x2="338" y2="381" stroke="black" class="thick"/>
  <circle cx="326" cy="378" r="9" fill="none" stroke="black" class="thick"/>

  <!-- Breathing tube from Y-valve to mouthpiece -->
  <path d="M326,369 Q326,345 334,305 Q342,265 360,225 Q378,190 392,160 Q398,135 400,110" fill="none" stroke="black" class="med"/>
  <!-- Tube corrugation rings -->
  <ellipse cx="338" cy="290" rx="4" ry="2" fill="none" stroke="black" class="thin"/>
  <ellipse cx="355" cy="245" rx="4" ry="2" fill="none" stroke="black" class="thin"/>
  <ellipse cx="378" cy="190" rx="4" ry="2" fill="none" stroke="black" class="thin"/>
  <!-- Mouthpiece -->
  <ellipse cx="400" cy="108" rx="8" ry="5" fill="none" stroke="black" class="med"/>

  <!-- STABILIZER STRAP -->
  <path d="M265,415 L260,475 Q255,525 260,565 Q265,585 285,593 Q315,600 345,593 Q365,585 370,565 Q375,525 370,475 L368,415" fill="none" stroke="black" stroke-dasharray="6,3" class="med"/>
  <rect x="300" y="587" width="22" height="10" rx="2" fill="none" stroke="black" class="med"/>

  <!-- REFERENCE LABELS (numbers only) -->
  <line x1="418" y1="388" x2="470" y2="405" stroke="black" class="leader"/>
  <text x="475" y="409" class="label">100</text>

  <line x1="540" y1="399" x2="590" y2="390" stroke="black" class="leader"/>
  <text x="595" y="394" class="label">102</text>

  <line x1="275" y1="485" x2="230" y2="485" stroke="black" class="leader"/>
  <text x="205" y="489" class="label">104</text>

  <line x1="315" y1="387" x2="280" y2="360" stroke="black" class="leader"/>
  <text x="255" y="355" class="label">106</text>

  <line x1="375" y1="485" x2="425" y2="485" stroke="black" class="leader"/>
  <text x="430" y="489" class="label">108</text>

  <line x1="280" y1="525" x2="225" y2="535" stroke="black" class="leader"/>
  <text x="190" y="539" class="label">110</text>

  <line x1="335" y1="378" x2="390" y2="360" stroke="black" class="leader"/>
  <text x="395" y="358" class="label">112</text>

  <line x1="285" y1="593" x2="235" y2="610" stroke="black" class="leader"/>
  <text x="190" y="614" class="label">114</text>

  <line x1="450" y1="398" x2="490" y2="361" stroke="black" class="leader"/>
  <text x="495" y="359" class="label">116</text>

  <line x1="358" y1="240" x2="415" y2="240" stroke="black" class="leader"/>
  <text x="420" y="244" class="label">140</text>

  <!-- Legend -->
  <text x="50" y="700" class="caption" font-weight="bold">Reference Numerals:</text>
  <text x="50" y="715" class="caption">100 — Quick-release belt buckle  |  102 — Waist belt (50mm webbing)  |  104 — Fabric loop retention</text>
  <text x="50" y="730" class="caption">106 — D-ring attachment  |  108 — Tank cradle (webbing loop)  |  110 — 0.5L tank  |  112 — Y-valve manifold</text>
  <text x="50" y="745" class="caption">114 — Stabilizer strap (upper thigh)  |  116 — Neoprene comfort padding  |  140 — Breathing tube</text>
</svg>