<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <style>
    text { font-family: Arial, sans-serif; }
    .label { font-size: 12px; font-weight: bold; }
    .caption { font-size: 10px; }
    .thin { stroke-width: 0.5; }
    .med { stroke-width: 1.2; }
    .thick { stroke-width: 2.0; }
    .leader { stroke-width: 0.4; }
  </style>

  <text x="400" y="30" text-anchor="middle" font-size="14" font-weight="bold">FIG. 4</text>

  <!-- Silicone face seal (dashed — soft material) -->
  <path d="M400,90 Q540,90 575,165 Q598,230 595,305 Q590,380 565,435 Q540,485 490,525 Q445,555 400,565 Q355,555 310,525 Q260,485 235,435 Q210,380 205,305 Q202,230 225,165 Q260,90 400,90 Z" fill="none" stroke="black" stroke-dasharray="6,3" class="med"/>

  <!-- Mask frame — low-profile, wide, matching AquaPulse render -->
  <path d="M400,115 Q520,115 548,178 Q568,232 564,298 Q560,360 545,405 Q525,455 480,492 Q445,518 400,526 Q355,518 320,492 Q275,455 255,405 Q240,360 236,298 Q232,232 252,178 Q280,115 400,115 Z" fill="none" stroke="black" class="thick"/>

  <!-- Single panoramic lens (wide, no divider) -->
  <path d="M400,150 Q498,150 522,200 Q542,245 540,300 Q538,352 522,390 Q502,432 465,460 Q438,478 400,484 Q362,478 335,460 Q298,432 278,390 Q262,352 260,300 Q258,245 278,200 Q302,150 400,150 Z" fill="none" stroke="black" class="med"/>

  <!-- Nose bridge area (subtle bump within lens, dashed) -->
  <path d="M385,380 Q390,400 400,410 Q410,400 415,380" fill="none" stroke="black" stroke-dasharray="4,2" class="thin"/>

  <!-- Nose pocket (3D integrated bump in face seal below lens) -->
  <path d="M375,484 Q380,508 400,520 Q420,508 425,484" fill="none" stroke="black" class="med"/>
  <!-- Nose pocket interior contour -->
  <path d="M382,488 Q390,505 400,512 Q410,505 418,488" fill="none" stroke="black" stroke-dasharray="3,2" class="thin"/>

  <!-- Strap attachment hardware (left and right — small post/loop) -->
  <rect x="198" y="270" width="12" height="18" rx="3" fill="none" stroke="black" class="med"/>
  <line x1="194" y1="279" x2="170" y2="279" stroke="black" class="med"/>
  <rect x="590" y="270" width="12" height="18" rx="3" fill="none" stroke="black" class="med"/>
  <line x1="602" y1="279" x2="630" y2="279" stroke="black" class="med"/>

  <!-- Strap fragments going to sides -->
  <path d="M170,279 L140,272 Q130,270 126,276 L126,282 Q130,288 140,286 L170,279" fill="none" stroke="black" class="med"/>
  <path d="M630,279 L660,272 Q670,270 674,276 L674,282 Q670,288 660,286 L630,279" fill="none" stroke="black" class="med"/>

  <!-- Mouthpiece at bottom center -->
  <path d="M385,540 Q390,535 400,533 Q410,535 415,540 L417,555 Q413,562 400,565 Q387,562 383,555 Z" fill="none" stroke="black" class="med"/>

  <!-- Breathing tube connection point (where tube attaches to mouthpiece) -->
  <circle cx="400" cy="575" r="6" fill="none" stroke="black" class="med"/>

  <!-- Tube going down -->
  <path d="M394,581 L394,620 Q394,640 396,660" fill="none" stroke="black" class="med"/>
  <path d="M406,581 L406,620 Q406,640 404,660" fill="none" stroke="black" class="thin"/>

  <!-- REFERENCE LABELS (numbers only, no text on drawing) -->
  <line x1="290" y1="115" x2="230" y2="90" stroke="black" class="leader"/>
  <circle cx="290" cy="115" r="1.5" fill="black"/>
  <text x="185" y="94" class="label">10</text>

  <line x1="340" y1="255" x2="210" y2="230" stroke="black" class="leader"/>
  <circle cx="340" cy="255" r="1.5" fill="black"/>
  <text x="160" y="234" class="label">12</text>

  <line x1="575" y1="175" x2="630" y2="145" stroke="black" class="leader"/>
  <circle cx="575" cy="175" r="1.5" fill="black"/>
  <text x="635" y="149" class="label">14</text>

  <line x1="425" y1="520" x2="480" y2="510" stroke="black" class="leader"/>
  <circle cx="425" cy="520" r="1.5" fill="black"/>
  <text x="485" y="514" class="label">16</text>

  <line x1="204" y1="265" x2="175" y2="240" stroke="black" class="leader"/>
  <circle cx="204" cy="265" r="1.5" fill="black"/>
  <text x="130" y="244" class="label">18</text>

  <line x1="415" y1="548" x2="465" y2="548" stroke="black" class="leader"/>
  <circle cx="415" cy="548" r="1.5" fill="black"/>
  <text x="470" y="552" class="label">24</text>

  <line x1="406" y1="640" x2="450" y2="650" stroke="black" class="leader"/>
  <circle cx="406" cy="640" r="1.5" fill="black"/>
  <text x="455" y="654" class="label">26</text>

  <!-- Legend -->
  <text x="50" y="720" class="caption" font-weight="bold">Reference Numerals:</text>
  <text x="50" y="735" class="caption">10 — Mask frame  |  12 — Single panoramic lens  |  14 — Silicone face seal (dashed)  |  16 — Nose pocket</text>
  <text x="50" y="750" class="caption">18 — Strap attachment points  |  24 — Mouthpiece  |  26 — Breathing tube entry</text>
</svg>