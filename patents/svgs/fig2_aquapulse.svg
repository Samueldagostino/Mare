<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="black" stroke-width="0.8"/>
    </marker>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
    .label { font-size: 12px; font-weight: bold; }
    .caption { font-size: 10px; }
    .thin { stroke-width: 0.5; }
    .med { stroke-width: 1.2; }
    .thick { stroke-width: 2.0; }
    .leader { stroke-width: 0.4; }
    .body { stroke-width: 0.8; stroke-dasharray: 8,4; }
  </style>

  <text x="400" y="30" text-anchor="middle" font-size="14" font-weight="bold">FIG. 2</text>

  <!-- HUMAN HEAD — side profile with anatomical features -->
  <!-- Head contour -->
  <path d="M320,100 Q300,95 285,110 Q268,130 262,160 Q258,190 260,220 Q260,250 265,275 Q270,300 280,320 Q290,340 305,360 Q315,372 325,378 L345,378 Q360,370 372,355 Q382,338 385,315 Q388,290 385,260 Q380,230 370,200 Q358,165 345,140 Q335,115 320,100 Z" fill="none" stroke="black" class="body"/>
  <!-- Nose profile -->
  <path d="M385,250 Q395,248 400,258 Q405,270 402,278 Q398,285 390,288" fill="none" stroke="black" class="body"/>
  <!-- Lips -->
  <path d="M388,298 Q395,295 402,298 Q405,302 400,308 Q395,310 388,308" fill="none" stroke="black" class="body"/>
  <!-- Chin -->
  <path d="M385,315 Q390,340 380,360 Q370,372 355,378" fill="none" stroke="black" class="body"/>
  <!-- Ear -->
  <path d="M262,210 Q248,208 245,225 Q243,245 250,255 Q257,260 262,255" fill="none" stroke="black" class="body"/>
  <!-- Hair/head top contour -->
  <path d="M320,100 Q340,85 355,90 Q370,98 378,115 Q385,140 385,165" fill="none" stroke="black" class="body"/>
  <!-- Neck -->
  <path d="M325,378 Q318,400 315,430" fill="none" stroke="black" class="body"/>
  <path d="M355,378 Q360,395 365,430" fill="none" stroke="black" class="body"/>
  <!-- Shoulder line -->
  <path d="M315,430 Q280,440 250,460" fill="none" stroke="black" class="body"/>
  <path d="M365,430 Q400,440 440,460" fill="none" stroke="black" class="body"/>

  <!-- MASK on face (solid lines — product component) -->
  <path d="M390,185 Q425,175 440,200 Q450,230 445,265 Q440,295 425,310 Q405,325 385,328" fill="none" stroke="black" class="thick"/>
  <!-- Visor surface -->
  <path d="M392,192 Q420,185 432,205 Q440,232 436,262 Q432,290 420,303 Q405,316 388,318" fill="none" stroke="black" class="med"/>
  <!-- Face seal against skin (dashed) -->
  <path d="M388,180 Q382,185 378,210 Q374,248 376,285 Q380,315 388,328" fill="none" stroke="black" stroke-dasharray="4,2" class="thin"/>

  <!-- Head strap going over crown -->
  <path d="M390,185 Q380,150 355,120 Q330,105 300,115 Q275,130 265,165" fill="none" stroke="black" class="med"/>
  <!-- Strap buckle at back -->
  <rect x="270" y="148" width="20" height="14" rx="2" fill="none" stroke="black" class="med"/>

  <!-- MOUTHPIECE in mouth area -->
  <path d="M400,300 L425,296 Q435,300 437,310 L437,318 Q435,326 425,328 L400,330" fill="none" stroke="black" class="thick"/>
  <!-- Bite flanges -->
  <line x1="405" y1="303" x2="430" y2="300" stroke="black" class="thin"/>
  <line x1="405" y1="326" x2="430" y2="324" stroke="black" class="thin"/>

  <!-- BREATHING TUBE — routing from mouthpiece down jaw, down chest to tank -->
  <!-- Tube outer wall -->
  <path d="M437,314 Q462,318 478,340 Q492,365 495,400 Q498,440 495,480 Q492,520 488,555 Q485,575 482,590" fill="none" stroke="black" class="med"/>
  <!-- Tube inner wall -->
  <path d="M433,320 Q456,324 470,344 Q484,370 487,405 Q490,444 487,484 Q484,524 480,558 Q477,578 474,593" fill="none" stroke="black" class="thin"/>
  <!-- Corrugation rings on tube -->
  <ellipse cx="486" cy="380" rx="5" ry="2" fill="none" stroke="black" class="thin"/>
  <ellipse cx="490" cy="420" rx="5" ry="2" fill="none" stroke="black" class="thin"/>
  <ellipse cx="492" cy="460" rx="5" ry="2" fill="none" stroke="black" class="thin"/>
  <ellipse cx="490" cy="500" rx="5" ry="2" fill="none" stroke="black" class="thin"/>
  <ellipse cx="487" cy="540" rx="5" ry="2" fill="none" stroke="black" class="thin"/>

  <!-- HAND holding tank (simplified outline) -->
  <path d="M510,580 Q505,595 500,610 Q497,625 500,640 Q505,652 515,658 Q525,662 535,658 Q545,650 548,638 Q550,620 545,600 Q540,585 530,575" fill="none" stroke="black" class="body"/>
  <!-- Fingers wrapped around tank -->
  <path d="M500,640 Q492,648 490,660 Q490,672 498,680" fill="none" stroke="black" class="body"/>
  <path d="M515,658 Q510,668 508,678" fill="none" stroke="black" class="body"/>

  <!-- TANK in hand -->
  <rect x="490" y="625" width="45" height="130" rx="22" fill="none" stroke="black" class="thick"/>
  <!-- Tank valve -->
  <rect x="502" y="610" width="22" height="18" rx="3" fill="none" stroke="black" class="med"/>
  <!-- Regulator on tank -->
  <rect x="488" y="588" width="50" height="25" rx="4" fill="none" stroke="black" class="med"/>

  <!-- Exhaled bubbles from mouth area -->
  <circle cx="430" cy="270" r="4" fill="none" stroke="black" class="thin"/>
  <circle cx="442" cy="255" r="3" fill="none" stroke="black" class="thin"/>
  <circle cx="436" cy="238" r="5" fill="none" stroke="black" class="thin"/>
  <circle cx="448" cy="220" r="3.5" fill="none" stroke="black" class="thin"/>

  <!-- REFERENCE LABELS (numbers only) -->
  <line x1="440" y1="200" x2="495" y2="185" stroke="black" class="leader"/>
  <circle cx="440" cy="200" r="1.5" fill="black"/>
  <text x="500" y="189" class="label">10</text>

  <line x1="434" y1="248" x2="495" y2="240" stroke="black" class="leader"/>
  <circle cx="434" cy="248" r="1.5" fill="black"/>
  <text x="500" y="244" class="label">12</text>

  <line x1="378" y1="255" x2="330" y2="265" stroke="black" class="leader"/>
  <circle cx="378" cy="255" r="1.5" fill="black"/>
  <text x="290" y="269" class="label">14</text>

  <line x1="355" y1="120" x2="310" y2="90" stroke="black" class="leader"/>
  <text x="275" y="90" class="label">20</text>

  <line x1="280" y1="155" x2="240" y2="148" stroke="black" class="leader"/>
  <text x="200" y="152" class="label">22</text>

  <line x1="425" y1="314" x2="470" y2="305" stroke="black" class="leader"/>
  <circle cx="425" cy="314" r="1.5" fill="black"/>
  <text x="475" y="302" class="label">24</text>

  <line x1="495" y1="460" x2="545" y2="450" stroke="black" class="leader"/>
  <circle cx="495" cy="460" r="1.5" fill="black"/>
  <text x="550" y="454" class="label">26</text>

  <line x1="538" y1="600" x2="575" y2="590" stroke="black" class="leader"/>
  <circle cx="538" cy="600" r="1.5" fill="black"/>
  <text x="580" y="594" class="label">28/32</text>

  <line x1="535" y1="690" x2="575" y2="690" stroke="black" class="leader"/>
  <circle cx="535" cy="690" r="1.5" fill="black"/>
  <text x="580" y="694" class="label">36</text>

  <line x1="448" y1="255" x2="490" y2="248" stroke="black" class="leader"/>
  <text x="495" y="252" class="label">38</text>

  <!-- Legend -->
  <text x="50" y="810" class="caption" font-weight="bold">Reference Numerals:</text>
  <text x="50" y="825" class="caption">10 — Mask assembly  |  12 — Visor  |  14 — Face seal  |  20 — Head strap  |  22 — Buckle</text>
  <text x="50" y="840" class="caption">24 — Mouthpiece  |  26 — Breathing tube  |  28/32 — Regulator/first-stage  |  36 — Tank  |  38 — Exhaled bubbles</text>
</svg>