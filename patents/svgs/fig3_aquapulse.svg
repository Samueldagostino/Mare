<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <marker id="arrowIn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="black" stroke-width="0.8"/>
    </marker>
    <marker id="arrowOut" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="none" stroke="black" stroke-width="0.8"/>
    </marker>
  </defs>
  <style>
    text { font-family: Arial, sans-serif; }
    .label { font-size: 12px; font-weight: bold; }
    .caption { font-size: 10px; }
    .thin { stroke-width: 0.5; }
    .med { stroke-width: 1.2; }
    .thick { stroke-width: 2.0; }
    .leader { stroke-width: 0.4; }
    .hatch { stroke-width: 0.4; stroke: black; }
  </style>

  <text x="400" y="30" text-anchor="middle" font-size="14" font-weight="bold">FIG. 3</text>

  <!-- REGULATOR BODY outer housing (cross-section) -->
  <path d="M200,250 Q200,180 280,160 L520,160 Q600,180 600,250 L600,400 Q600,460 520,480 L280,480 Q200,460 200,400 Z" fill="none" stroke="black" class="thick"/>
  <!-- Cross-hatching for housing walls (45-degree parallel lines) -->
  <line x1="200" y1="250" x2="220" y2="230" class="hatch"/>
  <line x1="200" y1="280" x2="220" y2="260" class="hatch"/>
  <line x1="200" y1="310" x2="220" y2="290" class="hatch"/>
  <line x1="200" y1="340" x2="220" y2="320" class="hatch"/>
  <line x1="200" y1="370" x2="220" y2="350" class="hatch"/>
  <line x1="200" y1="400" x2="220" y2="380" class="hatch"/>
  <line x1="580" y1="230" x2="600" y2="250" class="hatch"/>
  <line x1="580" y1="260" x2="600" y2="280" class="hatch"/>
  <line x1="580" y1="290" x2="600" y2="310" class="hatch"/>
  <line x1="580" y1="320" x2="600" y2="340" class="hatch"/>
  <line x1="580" y1="350" x2="600" y2="370" class="hatch"/>
  <line x1="580" y1="380" x2="600" y2="400" class="hatch"/>

  <!-- Diaphragm housing dome (top) -->
  <path d="M250,160 Q400,80 550,160" fill="none" stroke="black" class="thick"/>
  <!-- Cross-hatching for dome housing wall -->
  <line x1="275" y1="148" x2="295" y2="128" class="hatch"/>
  <line x1="315" y1="140" x2="335" y2="115" class="hatch"/>
  <line x1="355" y1="135" x2="375" y2="106" class="hatch"/>
  <line x1="395" y1="132" x2="415" y2="104" class="hatch"/>
  <line x1="435" y1="135" x2="455" y2="110" class="hatch"/>
  <line x1="475" y1="140" x2="495" y2="118" class="hatch"/>
  <line x1="515" y1="148" x2="530" y2="133" class="hatch"/>

  <!-- Diaphragm membrane (thin, flexible, curved under pressure) -->
  <path d="M270,160 Q400,120 530,160" fill="none" stroke="black" stroke-dasharray="2,2" class="med"/>
  <!-- Show deflection with a second position (resting) -->
  <path d="M270,160 Q400,140 530,160" fill="none" stroke="gray" stroke-dasharray="4,4" class="thin"/>

  <!-- Demand lever mechanism -->
  <line x1="400" y1="140" x2="400" y2="220" stroke="black" class="med"/>
  <circle cx="400" cy="220" r="8" fill="none" stroke="black" class="med"/>
  <!-- Spring -->
  <path d="M395,228 Q390,238 395,248 Q400,258 395,268 Q390,278 395,288" fill="none" stroke="black" class="thin"/>

  <!-- Valve seat with cross-hatching -->
  <rect x="380" y="290" width="40" height="15" rx="2" fill="none" stroke="black" class="med"/>
  <line x1="383" y1="293" x2="393" y2="303" class="hatch"/>
  <line x1="393" y1="293" x2="403" y2="303" class="hatch"/>
  <line x1="403" y1="293" x2="413" y2="303" class="hatch"/>

  <!-- Air flow chamber below valve -->
  <rect x="340" y="310" width="120" height="50" fill="none" stroke="black" class="med"/>

  <!-- INHALE FLOW ARROWS (showing complete air path) -->
  <!-- From LP hose port into chamber -->
  <path d="M620,335 L460,335" fill="none" stroke="black" class="thin" marker-end="url(#arrowIn)"/>
  <!-- Up through valve seat -->
  <path d="M400,310 L400,305" fill="none" stroke="black" class="thin" marker-end="url(#arrowIn)"/>
  <!-- Through diaphragm area to mouthpiece -->
  <path d="M340,335 L220,335" fill="none" stroke="black" class="thin" marker-end="url(#arrowIn)"/>
  <!-- Out through mouthpiece to user -->
  <path d="M100,385 L65,385" fill="none" stroke="black" class="thin" marker-end="url(#arrowIn)"/>

  <!-- EXHALE indicator (separate path around mouthpiece to ambient) -->
  <path d="M65,400 Q55,415 60,430 Q70,445 85,445" fill="none" stroke="black" class="thin" marker-end="url(#arrowIn)"/>
  <text x="45" y="450" font-size="8" fill="gray" font-style="italic">exhale</text>

  <!-- PURGE BUTTON -->
  <circle cx="400" cy="450" r="25" fill="none" stroke="black" class="thick"/>
  <circle cx="400" cy="450" r="20" fill="none" stroke="black" class="med"/>
  <!-- Purge spring -->
  <path d="M400,425 Q395,418 400,411 Q405,404 400,397 Q395,390 400,383" fill="none" stroke="black" class="thin"/>

  <!-- LP HOSE CONNECTION (right side) -->
  <rect x="600" y="305" width="80" height="30" rx="5" fill="none" stroke="black" class="med"/>
  <!-- Cross-hatching for hose connector body -->
  <line x1="605" y1="310" x2="615" y2="330" class="hatch"/>
  <line x1="620" y1="310" x2="630" y2="330" class="hatch"/>
  <line x1="635" y1="310" x2="645" y2="330" class="hatch"/>
  <line x1="650" y1="310" x2="660" y2="330" class="hatch"/>
  <line x1="665" y1="310" x2="675" y2="330" class="hatch"/>
  <!-- Hose barb threads -->
  <line x1="680" y1="308" x2="695" y2="308" stroke="black" class="thin"/>
  <line x1="680" y1="313" x2="698" y2="313" stroke="black" class="thin"/>
  <line x1="680" y1="318" x2="698" y2="318" stroke="black" class="thin"/>
  <line x1="680" y1="323" x2="698" y2="323" stroke="black" class="thin"/>
  <line x1="680" y1="328" x2="695" y2="328" stroke="black" class="thin"/>
  <!-- Hose -->
  <path d="M698,318 L760,318" fill="none" stroke="black" class="med"/>

  <!-- MOUTHPIECE (left side) -->
  <path d="M200,340 L140,340 Q100,340 90,355 Q80,370 85,385 L85,395 Q80,410 90,420 Q100,430 140,430 L200,430" fill="none" stroke="black" class="thick"/>
  <!-- Bite tabs (upper) -->
  <path d="M130,345 L130,360 Q120,360 120,352 Q120,345 130,345" fill="none" stroke="black" class="med"/>
  <!-- Bite tabs (lower) -->
  <path d="M130,415 L130,425 Q120,425 120,420 Q120,415 130,415" fill="none" stroke="black" class="med"/>
  <!-- Lip flange -->
  <path d="M95,350 Q70,360 65,385 Q70,410 95,420" fill="none" stroke="black" class="med"/>
  <!-- Air passage through mouthpiece (dashed — internal cavity) -->
  <rect x="100" y="370" width="100" height="30" fill="none" stroke="black" stroke-dasharray="4,2" class="thin"/>

  <!-- Tube connector -->
  <circle cx="200" cy="310" r="15" fill="none" stroke="black" class="med"/>
  <circle cx="200" cy="310" r="10" fill="none" stroke="black" class="thin"/>

  <!-- REFERENCE LABELS (numbers only) -->
  <line x1="400" y1="100" x2="480" y2="65" stroke="black" class="leader"/>
  <text x="485" y="69" class="label">40</text>

  <line x1="400" y1="220" x2="480" y2="210" stroke="black" class="leader"/>
  <text x="485" y="214" class="label">42</text>

  <line x1="420" y1="297" x2="480" y2="285" stroke="black" class="leader"/>
  <text x="485" y="289" class="label">44</text>

  <line x1="400" y1="475" x2="480" y2="478" stroke="black" class="leader"/>
  <text x="485" y="482" class="label">30</text>

  <line x1="640" y1="305" x2="640" y2="280" stroke="black" class="leader"/>
  <text x="625" y="275" class="label">46</text>

  <line x1="85" y1="385" x2="45" y2="385" stroke="black" class="leader"/>
  <text x="20" y="389" class="label">24</text>

  <line x1="125" y1="352" x2="45" y2="345" stroke="black" class="leader"/>
  <text x="20" y="349" class="label">48</text>

  <line x1="70" y1="385" x2="45" y2="415" stroke="black" class="leader"/>
  <text x="20" y="419" class="label">50</text>

  <line x1="200" y1="310" x2="160" y2="280" stroke="black" class="leader"/>
  <text x="120" y="279" class="label">52</text>

  <line x1="400" y1="335" x2="480" y2="340" stroke="black" class="leader"/>
  <text x="485" y="344" class="label">54</text>

  <!-- Legend -->
  <text x="50" y="560" class="caption" font-weight="bold">Reference Numerals:</text>
  <text x="50" y="575" class="caption">24 — Mouthpiece  |  30 — Purge button  |  40 — Diaphragm  |  42 — Demand lever  |  44 — Valve seat</text>
  <text x="50" y="590" class="caption">46 — LP hose port  |  48 — Bite flanges  |  50 — Lip flange  |  52 — Tube connector  |  54 — Air flow chamber</text>
</svg>